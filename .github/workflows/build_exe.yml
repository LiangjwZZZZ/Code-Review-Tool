name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'          # 推 tag 时自动构建，如 git tag v1.0.0 && git push --tags
  workflow_dispatch:  # 也可以在 GitHub Actions 页面手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-ui/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build frontend
        working-directory: web-ui
        run: |
          npm ci
          npm run build

      - name: Package with PyInstaller
        run: python -m PyInstaller code_review.spec --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeReview-Windows
          path: dist/CodeReview/
          retention-days: 30

      - name: Create release ZIP
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path dist/CodeReview/* -DestinationPath dist/CodeReview-Windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CodeReview-Windows.zip
          generate_release_notes: true
